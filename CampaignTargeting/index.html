    background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px;

  .challenge-desc { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; margin-bottom: 18px; }

  .editor-wrap { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
  .editor-header { background: var(--surface2); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }

  .editor-btn { padding: 5px 12px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 12px; }

  #code-editor {

  .out-ok { color: var(--success); }

  .solution-panel { display: none; background: var(--code-bg); border: 1px solid #2a4a2a; border-radius: 8px; padding: 18px; margin-top: 10px; }

  .hints-list { list-style: none; }

  .hints-list li::before { content: '→ '; color: var(--accent); }
</style>

  id: "m1-intro", type: "read", title: "What Is Amazon Advertising?",
  content: () => `
  <div class="read-section">
    <h2>What Is Amazon Advertising?</h2>
    <p class="tagline">📖 Reading · ~7 min</p>
    <div class="card">
      <h3>The Big Picture</h3>
      <p>Amazon Advertising is Amazon's self-serve and programmatic advertising platform. It lets brands, sellers, and agencies place paid ads across Amazon's properties — product search results, detail pages, Prime Video, Fire TV, Amazon Music, Twitch, and off-Amazon publisher sites.</p>
      <p style="margin-top:10px">Amazon is the <strong>#3 digital ad platform</strong> in the US behind Google and Meta, generating over $50B/year in ad revenue. Unlike Google (intent search) and Meta (social), Amazon ads intercept buyers at the <em>moment of purchase intent</em> — making conversion rates exceptionally high.</p>
      <div class="callout info">💡 Amazon's advertising advantage is <strong>closed-loop attribution</strong> — they can directly link an ad click to a purchase because they own the checkout. Google and Meta cannot do this.</div>
    </div>
    <div class="card">
      <h3>The Full Amazon Ad Product Suite</h3>
      <table>
        <tr><th>Ad Type</th><th>Who Can Use</th><th>Where It Shows</th><th>Pricing</th></tr>
        <tr><td><strong>Sponsored Products</strong></td><td>Sellers, Vendors</td><td>Search results, detail pages</td><td>CPC</td></tr>
        <tr><td><strong>Sponsored Brands</strong></td><td>Brand-registered Sellers, Vendors</td><td>Top of search, video banner</td><td>CPC</td></tr>
        <tr><td><strong>Sponsored Display</strong></td><td>Sellers, Vendors</td><td>On &amp; off Amazon</td><td>CPC or vCPM</td></tr>
        <tr><td><strong>Streaming TV Ads (CTV)</strong></td><td>All advertisers via DSP or SD</td><td>Prime Video, Fire TV, Twitch, TNF</td><td>CPM</td></tr>
        <tr><td><strong>Audio Ads</strong></td><td>All advertisers via DSP</td><td>Amazon Music, Wondery, Twitch, Alexa</td><td>CPM</td></tr>
        <tr><td><strong>Display Ads</strong></td><td>All advertisers via DSP</td><td>Amazon properties + 3rd-party sites</td><td>CPM</td></tr>
        <tr><td><strong>Device Ads</strong></td><td>All advertisers</td><td>Fire tablets, Echo Show, Fire TV screensaver</td><td>CPM</td></tr>
        <tr><td><strong>Out-of-Home Ads</strong></td><td>All advertisers</td><td>On-package, in-store, locker screens</td><td>Varies</td></tr>
        <tr><td><strong>Amazon DSP</strong></td><td>Agencies, brands (managed/self-serve)</td><td>All Amazon + publisher network</td><td>CPM</td></tr>
      </table>
      <div class="callout warn">⚠️ <strong>CTV ≠ DSP.</strong> Streaming TV ads can now be bought via Sponsored Display (no minimum spend) OR Amazon DSP (self-serve — no enforced minimum, managed service ~$35K/quarter). Don't assume CTV requires DSP access.</div>
    </div>
    <div class="card">
      <h3>Streaming TV (CTV) — The Fast-Growing Format</h3>
      <p><strong>Connected TV (CTV)</strong> means video ads delivered to internet-connected TVs and streaming devices. Amazon's CTV inventory is massive:</p>
      <ul>
        <li><strong>Prime Video</strong> — ad-supported tier with originals, live sports (Thursday Night Football), movies</li>
        <li><strong>Fire TV Channels</strong> — 900+ free channels across 30+ categories</li>
        <li><strong>Twitch</strong> — gaming, esports, music, IRL livestreams</li>
        <li><strong>Amazon Publisher Direct (APD)</strong> — 3rd-party broadcaster apps on Fire TV</li>
      </ul>
      <p style="margin-top:10px">CTV ads are <strong>full-screen, non-skippable</strong>, and run 15–30 seconds. They use Amazon's first-party shopping + streaming signals for targeting (20,000+ audience segments). No cookie reliance.</p>
    </div>
    <div class="card">
      <h3>Audio Ads</h3>
      <p>10–60 second non-skippable audio ads running between music tracks or podcast episodes:</p>
      <ul>
        <li><strong>Amazon Music</strong> — ad-supported tier</li>
        <li><strong>Wondery</strong> — Amazon-owned podcast network</li>
        <li><strong>Twitch</strong> — audio during livestreams</li>
        <li><strong>Interactive Audio</strong> — listeners can say "Alexa, add to cart" or "send me more info"</li>
      </ul>
    </div>
    <div class="card">
      <h3>How the Auction Works (Sponsored Ads)</h3>
      <p>Sponsored Products, Brands, and Display run on a <strong>generalized second-price auction</strong>. You set a maximum CPC bid; if you win, you pay <em>one cent more than the second-highest bid</em>, not your full max bid.</p>
      <div class="callout info">💡 Winning = <strong>Relevance Score × Bid</strong>. A highly relevant listing with a lower bid can outrank a high bid on an irrelevant listing. This is why listing quality (title, images, reviews) directly affects ad cost.</div>
    </div>
    <div class="card">
      <h3>Key Metrics You'll See Everywhere</h3>
      <div class="tag-grid">
        <div class="tag"><strong>ACOS</strong> — Advertising Cost of Sale = Spend ÷ Revenue</div>
        <div class="tag"><strong>TACOS</strong> — Total ACOS = Ad Spend ÷ Total Revenue (organic + paid)</div>
        <div class="tag"><strong>ROAS</strong> — Return on Ad Spend = Revenue ÷ Spend</div>
        <div class="tag"><strong>CPC</strong> — Cost Per Click</div>
        <div class="tag"><strong>CPM</strong> — Cost Per 1,000 Impressions (CTV, Audio, Display, DSP)</div>
        <div class="tag"><strong>CTR</strong> — Click-Through Rate = Clicks ÷ Impressions</div>
        <div class="tag"><strong>CVR</strong> — Conversion Rate = Orders ÷ Clicks</div>
        <div class="tag"><strong>NTB</strong> — New-to-Brand orders (bought from your brand &lt;12 months)</div>
        <div class="tag"><strong>VCR</strong> — Video Completion Rate (CTV / video ads)</div>
        <div class="tag"><strong>DPVR</strong> — Detail Page View Rate</div>
      </div>
    </div>
    <div class="callout tip">✅ CPC metrics chain: <strong>Impressions → Clicks (CTR) → Orders (CVR) → Revenue → ACOS</strong><br>CPM metrics chain: <strong>Impressions → VCR → Brand Searches → Detail Page Views → Purchases</strong></div>
    <div class="card">
      <h3>🗓️ What's New in Amazon Ads — 2026 Edition</h3>
      <p>This course reflects the state of Amazon Advertising as of <strong>June 2026</strong>. Key changes from the past year:</p>
      <table>
        <tr><th>Update</th><th>When</th><th>What Changed</th></tr>
        <tr><td><strong>Amazon Ads API v1</strong></td><td>GA December 2025</td><td>New unified API replacing product-specific v3 APIs. Different headers: <code>Amazon-Ads-ClientId</code> + <code>Amazon-Ads-AccountId</code>. v3 still supported during transition.</td></tr>
        <tr><td><strong>AMC Lookback Window</strong></td><td>November 2025</td><td>Extended from 13 months → <strong>25 months</strong>. Amazon Retail Purchases dataset now covers 5 years.</td></tr>
        <tr><td><strong>Sponsored TV Self-Serve</strong></td><td>2026</td><td>Fully self-serve in US, UK, Brazil, Mexico, and Canada. No managed-service spend requirement.</td></tr>
        <tr><td><strong>AI-Powered Targeting</strong></td><td>February 2026</td><td>New Product Targeting and In-Market Categories using unified AI audience signals for display, video, and audio campaigns.</td></tr>
      </table>
      <div class="callout info">💡 This course teaches <strong>both v1 and v3</strong> — you'll encounter v3 in existing integrations and v1 in new builds. Module 3 covers the header differences.</div>
    </div>
  </div>`
},

  <div class="read-section">
    <h2>Campaign Hierarchy</h2>
    <p class="tagline">📖 Reading · ~4 min</p>
    <div class="card">
      <h3>The 4-Level Tree</h3>
      <p>Every Amazon ad lives inside a hierarchy. Understanding it is critical for both the console UI and the API:</p>

      <h3>Campaign Settings</h3>

      <p>Negative keywords <em>block</em> your ad from showing on unwanted searches. They come in two flavors:</p>

    <h2>Amazon Ads API — Overview & Authentication</h2>
    <p class="tagline">📖 Reading · ~6 min</p>
    <div class="card">
      <h3>What is the Amazon Ads API?</h3>
      <p>The Amazon Advertising API is a REST API that gives programmatic access to everything in Amazon Ads: campaigns, ad groups, keywords, bids, budgets, and reports. It's the engine behind every third-party ads management tool (Perpetua, Pacvue, Skai, etc.).</p>
      <div class="callout info">🆕 <strong>Amazon Ads API v1 — The Unified Modern API (GA December 2025):</strong> v1 is the new standard for all new integrations. It unifies Sponsored Products, Sponsored Brands, Sponsored Display, Sponsored TV, and DSP under one consistent schema and set of headers. <strong>v3 is still supported</strong> (no retirement date announced) — existing integrations keep working, but build anything new on v1.</div>
      <div class="callout warn">⚠️ <strong>API v2 is fully deprecated.</strong> v3 is supported legacy. v1 is the recommended path for new development.</div>
      <div class="callout info">🌍 <strong>Regional base URLs (same for v1 and v3):</strong> The API domain is <code>advertising-api.amazon.com</code> (NOT <code>advertising.amazon.com</code>). North America → <code>advertising-api.amazon.com</code> | Europe → <code>advertising-api-eu.amazon.com</code> | Far East → <code>advertising-api-fe.amazon.com</code></div>
      <table>
        <tr><th>Product</th><th>Path (append to regional base URL)</th><th>Version</th></tr>
        <tr><td>Sponsored Products</td><td><code>/sp/campaigns</code>, <code>/sp/adGroups</code>, <code>/sp/keywords</code></td><td>v3 (supported) · v1 (new)</td></tr>
        <tr><td>Sponsored Brands</td><td><code>/sb/campaigns</code>, <code>/sb/keywords</code></td><td>v3 (supported) · v1 (new)</td></tr>
        <tr><td>Sponsored Display</td><td><code>/sd/campaigns</code>, <code>/sd/targets</code></td><td>v3 (supported) · v1 (new)</td></tr>
        <tr><td>Sponsored TV</td><td><code>/stv/campaigns</code></td><td>v1 self-serve</td></tr>
        <tr><td>DSP</td><td><code>/dsp/campaigns</code>, <code>/dsp/lineItems</code></td><td>v1 (separate auth scope)</td></tr>
        <tr><td>Reports v3</td><td><code>/reporting/reports</code></td><td>v3 — async, poll for completion</td></tr>
        <tr><td>Amazon Marketing Cloud</td><td><code>/amc/reporting/workgroups/{id}/queries</code></td><td>See Module 6</td></tr>
      </table>
    </div>
    <div class="card">
      <h3>v1 vs v3 — Header Differences</h3>
      <p>The biggest practical difference between v1 and v3 is the required headers. If you're building new code, use the v1 headers:</p>
      <table>
        <tr><th></th><th>v3 (legacy, still works)</th><th>v1 (new — use for new code)</th></tr>
        <tr><td>Client ID</td><td><code>Amazon-Advertising-API-ClientId</code></td><td><code>Amazon-Ads-ClientId</code></td></tr>
        <tr><td>Account scope</td><td><code>Amazon-Advertising-API-Scope</code> (Profile ID)</td><td><code>Amazon-Ads-AccountId</code> (Profile ID)</td></tr>
        <tr><td>Auth</td><td><code>Authorization: Bearer {token}</code></td><td><code>Authorization: Bearer {token}</code></td></tr>
      </table>
      <div class="callout tip">✅ The OAuth2/LWA token exchange is <strong>identical</strong> for v1 and v3 — same endpoint, same grant types, same refresh flow. Only the per-request headers differ.</div>
    </div>
    <div class="card">
      <h3>Authentication — Login with Amazon (LWA)</h3>
      <p>The API uses <strong>OAuth 2.0</strong> via Amazon's LWA (Login with Amazon) service. Two grant types:</p>
      <table>
        <tr><th>Grant Type</th><th>Use Case</th><th>Token Type</th></tr>
        <tr><td>Authorization Code</td><td>3rd-party apps acting on behalf of advertisers</td><td>Access + Refresh token</td></tr>
        <tr><td>Client Credentials</td><td>Server-to-server (your own account only)</td><td>Access token</td></tr>
      </table>
      <pre><span class="cm">// Step 1: Exchange code for tokens</span>
<span class="kw">POST</span> https://api.amazon.com/auth/o2/token
Content-Type: application/x-www-form-urlencoded

grant_type=authorization_code
&code=<span class="str">AUTH_CODE</span>
&redirect_uri=<span class="str">https://yourapp.com/callback</span>
&client_id=<span class="str">amzn1.application-oa2-client.xxx</span>
&client_secret=<span class="str">your_secret</span>

<span class="cm">// Response</span>
{
  <span class="str">"access_token"</span>: <span class="str">"Atza|..."</span>,       <span class="cm">// expires in 1 hour</span>
  <span class="str">"refresh_token"</span>: <span class="str">"Atzr|..."</span>,     <span class="cm">// long-lived, store securely</span>
  <span class="str">"token_type"</span>: <span class="str">"bearer"</span>,
  <span class="str">"expires_in"</span>: <span class="nm">3600</span>
}</pre>
    </div>
    <div class="card">
      <h3>Required Headers on Every Request</h3>
      <pre>Authorization: Bearer <span class="str">Atza|access_token_here</span>
Amazon-Advertising-API-ClientId: <span class="str">amzn1.application-oa2-client.xxx</span>
Amazon-Advertising-API-Scope: <span class="str">1234567890</span>   <span class="cm">// Profile ID</span>
Content-Type: application/json</pre>
      <div class="callout warn">⚠️ The <code>Amazon-Advertising-API-Scope</code> header is the <strong>Profile ID</strong> — not your seller/vendor account ID. You must first call <code>GET /v2/profiles</code> to discover profile IDs.</div>
    </div>
    <div class="card">
      <h3>Rate Limiting</h3>
      <ul>
        <li>Limits are per endpoint and per client ID, not global</li>
        <li>Most read endpoints: ~5 req/s burst, ~0.5 req/s sustained</li>
        <li>Writes (create/update): lower limits, often 1–2 req/s</li>
        <li>When rate limited: HTTP <code>429 Too Many Requests</code></li>
        <li>Strategy: exponential backoff with jitter; check <code>Retry-After</code> header</li>
      </ul>
    </div>
  </div>`

import (
	"fmt"
	"net/http"
)

type AdsClient struct {
	ClientID    string
	ProfileID   string
	AccessToken string
	HTTPClient  *http.Client
	BaseURL     string

func NewAdsClient(clientID, profileID, accessToken string) *AdsClient {
	return &AdsClient{
		ClientID:    clientID,
		ProfileID:   profileID,
		AccessToken: accessToken,
		HTTPClient:  &http.Client{},
		BaseURL:     "https://advertising-api.amazon.com",
	}
}

func (c *AdsClient) Get(endpoint string) (*http.Response, error) {
	req, err := http.NewRequest("GET", c.BaseURL+endpoint, nil)
	if err != nil {
		return nil, err
	}
	req.Header.Set("Authorization", "Bearer "+c.AccessToken)
	req.Header.Set("Amazon-Advertising-API-ClientId", c.ClientID)
	req.Header.Set("Amazon-Advertising-API-Scope", c.ProfileID)
	req.Header.Set("Content-Type", "application/json")
	return c.HTTPClient.Do(req)

    solution: `package main

import (
	"errors"
	"fmt"
	"math"
	"math/rand"
	"time"
)

type RetryConfig struct {
	MaxAttempts int
	BaseDelay   time.Duration
	MaxDelay    time.Duration
}

func WithRetry(cfg RetryConfig, fn func() error) error {
	var lastErr error
	for i := 0; i < cfg.MaxAttempts; i++ {
		if err := fn(); err == nil {
			return nil
		} else {
			lastErr = err
		}
		if i == cfg.MaxAttempts-1 {
			break
		}
		exp := math.Pow(2, float64(i))
		delay := time.Duration(float64(cfg.BaseDelay) * exp)
		if delay > cfg.MaxDelay {
			delay = cfg.MaxDelay
		}
		jitter := 0.5 + rand.Float64() // [0.5, 1.5]
		delay = time.Duration(float64(delay) * jitter)
		fmt.Printf("[retry] attempt %d failed, waiting %v\\n", i+1, delay.Round(time.Millisecond))
		time.Sleep(delay)
	}
	return lastErr
}

func main() {
	cfg := RetryConfig{
		MaxAttempts: 5,
		BaseDelay:   100 * time.Millisecond,
		MaxDelay:    5 * time.Second,
	}

	attempt := 0
	err := WithRetry(cfg, func() error {
		attempt++
		if attempt < 4 {
			return errors.New("429 Too Many Requests")
		}
		return nil
	})

	if err != nil {
		fmt.Println("All attempts failed:", err)
	} else {
		fmt.Printf("Succeeded on attempt %d\\n", attempt)
	}
}`,

      { pattern: /MaxDelay|maxDelay/, msg: "MaxDelay cap applied" },
      { pattern: /rand\.Float64\(\)|rand\.Float32\(\)/, msg: "Random jitter applied" },
      { pattern: /time\.Sleep/, msg: "Actually sleeps between retries" },

type TokenManager struct {
	ClientID     string
	ClientSecret string
	RefreshToken string
	AccessToken  string
	ExpiresAt    time.Time
	mu           sync.Mutex
}

func (tm *TokenManager) GetValidToken() (string, error) {
	tm.mu.Lock()
	defer tm.mu.Unlock()
	if time.Now().Add(60 * time.Second).Before(tm.ExpiresAt) {
		return tm.AccessToken, nil
	}
	if err := tm.refresh(); err != nil {
		return "", err
	}
	return tm.AccessToken, nil
}

func (tm *TokenManager) refresh() error {
	data := url.Values{}
	data.Set("grant_type", "refresh_token")
	data.Set("client_id", tm.ClientID)
	data.Set("client_secret", tm.ClientSecret)
	data.Set("refresh_token", tm.RefreshToken)

	resp, err := http.Post(
		"https://api.amazon.com/auth/o2/token",
		"application/x-www-form-urlencoded",
		strings.NewReader(data.Encode()),
	)
	if err != nil {
		return err
	}
	defer resp.Body.Close()
	body, _ := io.ReadAll(resp.Body)

	var tr tokenResponse
	if err := json.Unmarshal(body, &tr); err != nil {
		return err
	}
	tm.AccessToken = tr.AccessToken
	tm.ExpiresAt = time.Now().Add(time.Duration(tr.ExpiresIn) * time.Second)
	return nil
}

func main() {
	tm := &TokenManager{
		ClientID:     "amzn1.application-oa2-client.abc",
		ClientSecret: "secret123",
		RefreshToken: "Atzr|refreshtoken",
	}

	tm.AccessToken = "Atza|existingtoken"
	tm.ExpiresAt = time.Now().Add(10 * time.Minute)

	token, err := tm.GetValidToken()
	if err != nil {
		fmt.Println("Error:", err)
		return
	}
	fmt.Println("Got token:", token[:20]+"...")
}`,

      <p>AI assistants like Claude are powerful, but they live in isolation — they can't directly call your APIs, read your databases, or take actions in external systems. <strong>MCP (Model Context Protocol)</strong> is an open standard (created by Anthropic) that bridges this gap.</p>

      <h3>The Target ACOS Framework</h3>
      <p>Every bid optimization decision stems from your target ACOS (TACoS). Here's how to calculate the correct bid:</p>
      <pre>Max CPC Bid = Price × Conversion Rate × Target ACOS

Example:
  Product Price:       $29.99
  Conversion Rate:     12% (0.12)
  Target ACOS:         25% (0.25)

  Max Bid = $29.99 × 0.12 × 0.25 = $0.90</pre>

      <p>When adjusting existing bids based on performance data:</p>
      <pre>New Bid = Current Bid × (Target ACOS ÷ Actual ACOS)

Example:
  Current Bid:   $1.50
  Target ACOS:   25%
  Actual ACOS:   40%

  New Bid = $1.50 × (0.25 ÷ 0.40) = $1.50 × 0.625 = $0.94</pre>
      <p style="margin-top:10px">This formula proportionally adjusts bids to trend toward target ACOS. Cap adjustments to ±30% per cycle to avoid overcorrection.</p>

    solution: `package main

import (
	"fmt"
	"math"
)

type KeywordPerf struct {
	KeywordID  string  // SP API v3 IDs are strings
	CurrentBid float64
	ActualACOS float64
	Spend      float64
	Revenue    float64
}

type BidRecommendation struct {
	KeywordID      string  // SP API v3 IDs are strings
	CurrentBid     float64
	RecommendedBid float64
	ChangePercent  float64
	Action         string
}

func OptimizeBid(kw KeywordPerf, targetACOS float64) BidRecommendation {
	if kw.ActualACOS == 0 {
		return BidRecommendation{
			KeywordID:      kw.KeywordID,
			CurrentBid:     kw.CurrentBid,
			RecommendedBid: kw.CurrentBid,
			ChangePercent:  0,
			Action:         "HOLD",
		}
	}

	rawBid := kw.CurrentBid * (targetACOS / kw.ActualACOS)

	// Cap at ±30%
	minBid := kw.CurrentBid * 0.70
	maxBid := kw.CurrentBid * 1.30
	newBid := math.Min(math.Max(rawBid, minBid), maxBid)
	newBid = math.Round(newBid*100) / 100

	changePct := ((newBid - kw.CurrentBid) / kw.CurrentBid) * 100

	action := "HOLD"
	if newBid > kw.CurrentBid+0.001 {
		action = "INCREASE"
	} else if newBid < kw.CurrentBid-0.001 {
		action = "DECREASE"
	}

	return BidRecommendation{
		KeywordID:      kw.KeywordID,
		CurrentBid:     kw.CurrentBid,
		RecommendedBid: newBid,
		ChangePercent:  changePct,
		Action:         action,
	}
}

		{KeywordID: "KW-1001", CurrentBid: 1.50, ActualACOS: 0.40, Spend: 120, Revenue: 300},
		{KeywordID: "KW-1002", CurrentBid: 0.80, ActualACOS: 0.15, Spend: 60, Revenue: 400},

			rec.KeywordID, rec.CurrentBid, rec.RecommendedBid, rec.ChangePercent, rec.Action)
	}
}`,

      <pre>┌─────────────────────────────────────────────────────────┐
│                    AGENT LOOP (every N hours)            │
│                                                         │
│  1. SENSE    Pull metrics via Reports API               │
│              Pull AMC query results                     │
│              Pull bid recommendations                   │
│              ↓                                          │
│  2. REASON   Compare actuals vs. targets (ACOS, budget) │
│              Identify keywords to raise/lower/pause     │
│              Identify campaigns hitting budget cap      │
│              LLM call: generate action plan with        │
│              reasoning (for audit log)                  │
│              ↓                                          │
│  3. ACT      Batch update keyword bids (≤1000/req)      │
│              Update campaign budgets                    │
│              Pause/enable campaigns                     │
│              Create budget rules for future events      │
│              ↓                                          │
│  4. LOG      Record every change with before/after      │
│              values + reasoning to database             │
│              Send summary to Slack/email                │
└─────────────────────────────────────────────────────────┘</pre>
    </div>
    <div class="card">
      <h3>What the LLM Does in the Loop</h3>
      <p>The LLM (Claude/GPT) is NOT making raw API calls — it's the <strong>reasoning layer</strong> that interprets data and generates a structured action plan. Your Go code executes the plan.</p>
      <table>
        <tr><th>Component</th><th>Role</th><th>Technology</th></tr>
        <tr><td>Scheduler</td><td>Triggers the loop on cron</td><td>Go cron, AWS Lambda, etc.</td></tr>

        <tr><td>LLM reasoner</td><td>Interprets data, generates action JSON</td><td>Claude API / GPT-4</td></tr>
        <tr><td>Action executor</td><td>Validates + executes batch updates</td><td>Go + Amazon Ads API</td></tr>
        <tr><td>Audit logger</td><td>Records all changes with reasoning</td><td>PostgreSQL / DynamoDB</td></tr>

import (
	"fmt"
	"math"
)

type AgentConfig struct {
	TargetACOS      float64
	MaxBidChangePct float64
	MinClicks       float64
	DryRun          bool
}

type MetricRow struct {
	KeywordID  string
	CurrentBid float64
	ActualACOS float64
	Clicks     float64
}

type BidAction struct {
	KeywordID string
	OldBid    float64
	NewBid    float64
	Reason    string
}

func RunCycle(cfg AgentConfig, metrics []MetricRow) ([]BidAction, error) {
	var actions []BidAction

	for _, m := range metrics {
		if m.Clicks < cfg.MinClicks {
			continue // insufficient data
		}
		if m.ActualACOS == 0 {
			continue // no sales — hold bid
		}

		rawBid := m.CurrentBid * (cfg.TargetACOS / m.ActualACOS)
		maxUp := m.CurrentBid * (1 + cfg.MaxBidChangePct)
		maxDown := m.CurrentBid * (1 - cfg.MaxBidChangePct)
		newBid := math.Min(math.Max(rawBid, maxDown), maxUp)
		newBid = math.Round(newBid*100) / 100

		if math.Abs(newBid-m.CurrentBid) < 0.01 {
			continue // no meaningful change
		}

		direction := "INCREASE"
		if newBid < m.CurrentBid {
			direction = "DECREASE"
		}
		reason := fmt.Sprintf("%s bid: ACOS %.0f%% vs target %.0f%%",
			direction, m.ActualACOS*100, cfg.TargetACOS*100)

		actions = append(actions, BidAction{
			KeywordID: m.KeywordID,
			OldBid:    m.CurrentBid,
			NewBid:    newBid,
			Reason:    reason,
		})
	}

	if cfg.DryRun {
		fmt.Printf("[DRY RUN] Would execute %d bid changes\\n", len(actions))
	}
	return actions, nil
}

	cfg := AgentConfig{
		TargetACOS:      0.25,
		MaxBidChangePct: 0.30,
		MinClicks:       50,
		DryRun:          true,
	}

	metrics := []MetricRow{

	}

<p>The Claude API from Anthropic is how you give your Amazon Ads AI agent a brain. Instead of hard-coding rules, Claude reasons about the data you send it and decides what actions to take.</p>

<p>For an Amazon Ads agent making bid decisions, use <strong>claude-opus-4-8</strong> — the reasoning quality directly affects your ad spend.</p>

  ]

<pre>{
  "id": "msg_01...",
  "type": "message",
  "role": "assistant",

  content: () => `
<h2>Tool Use: Giving Claude the Ability to Act</h2>
<p>Tool use (also called "function calling") is the pattern that turns Claude from a chatbot into an agent. You define tools with JSON schemas, Claude decides which to call, and your Go code executes them against the Amazon Ads API.</p>

<h3>The Tool Use Loop</h3>
<pre>1. You send Claude a prompt + list of available tools
2. Claude responds with stop_reason: "tool_use" + a tool_use block
3. Your code executes the tool (calls Amazon Ads API)
4. You send the result back as role:"user" with type:"tool_result"
5. Claude responds with the final answer (stop_reason: "end_turn")</pre>

<h3>Defining a Tool in JSON</h3>
<pre>{
  "name": "update_keyword_bid",
  "description": "Updates the bid for a Sponsored Products keyword. Only call when clicks >= 50 and ACOS deviation > 5%.",
  "input_schema": {
    "type": "object",
    "properties": {
      "keyword_id": {"type": "string", "description": "The Amazon Ads keyword ID"},
      "new_bid":    {"type": "number", "description": "New bid in USD, e.g. 0.85"},
      "reason":     {"type": "string", "description": "Explanation for the bid change"}
    },
    "required": ["keyword_id", "new_bid", "reason"]
  }
}</pre>

<h3>Amazon Ads Agent Tool Kit</h3>
<table>
<tr><th>Tool Name</th><th>Purpose</th></tr>
<tr><td>get_keyword_metrics</td><td>Fetches clicks, spend, sales, ACOS for a keyword</td></tr>
<tr><td>update_keyword_bid</td><td>Changes bid via SP API v3 PUT /keywords</td></tr>
<tr><td>pause_keyword</td><td>Sets keyword state to PAUSED</td></tr>
<tr><td>request_report</td><td>Triggers a Sponsored Products report download</td></tr>
<tr><td>get_recommendations</td><td>Calls the Recommendations API for bid suggestions</td></tr>
</table>

<h3>The tool_use Response Block</h3>
<pre>{
  "type": "tool_use",
  "id": "toolu_01ABC...",
  "name": "update_keyword_bid",
  "input": {
    "keyword_id": "KW123456",
    "new_bid": 0.72,
    "reason": "ACOS 41% vs 25% target with 120 clicks; reducing bid 17%"
  }
}</pre>
<p>Save the <code>id</code> — you must return it in your tool_result so Claude knows which call completed.</p>

<h3>Sending a tool_result Back</h3>
<pre>{
  "role": "user",
  "content": [
    {
      "type": "tool_result",
      "tool_use_id": "toolu_01ABC...",
      "content": "Bid updated successfully. New bid: $0.72"
    }
  ]
}</pre>

<h3>Tool Description Best Practices</h3>
<ul>
<li>Tell Claude <em>when</em> to call the tool, not just what it does</li>
<li>Include units in parameter descriptions ("bid in USD, not cents")</li>
<li>Add guardrails in the description: "Only call if clicks >= 50"</li>
<li>Claude follows these instructions — they're prompt content</li>
</ul>

<h3>Tool Choice Control</h3>
<pre>"tool_choice": {"type": "auto"}      // Claude decides (default)
"tool_choice": {"type": "any"}       // Claude must call at least one tool
"tool_choice": {"type": "tool", "name": "get_keyword_metrics"}  // force specific tool</pre>
`

<h2>MCP: Model Context Protocol</h2>
<p>MCP is an open protocol from Anthropic that standardizes how AI models connect to external tools and data sources. Instead of custom API glue code for every tool, you build an MCP server once and any MCP-compatible AI can use it.</p>

<h3>The Three-Layer Architecture</h3>
<pre>┌─────────────────────────────────────────┐
│  Claude (AI)                            │
│  Reasons about ads, decides actions     │
└──────────────┬──────────────────────────┘
               │ tool_use (Claude API)
               ▼
┌─────────────────────────────────────────┐
│  MCP Client (your Go app)               │
│  Translates tool_use → MCP JSON-RPC     │
└──────────────┬──────────────────────────┘
               │ JSON-RPC 2.0 (stdio or HTTP/SSE)
               ▼
┌─────────────────────────────────────────┐
│  MCP Server (amazon-ads-mcp-server)     │
│  Exposes Amazon Ads API as MCP tools    │
└──────────────┬──────────────────────────┘
               │ HTTPS + OAuth2
               ▼
┌─────────────────────────────────────────┐
│  Amazon Ads API (SP, SB, SD, DSP, AMC) │
└─────────────────────────────────────────┘</pre>

<h3>MCP JSON-RPC 2.0 Wire Format</h3>
<pre>// Request (MCP Client → MCP Server)
{
  "jsonrpc": "2.0",
  "id": 1,
  "method": "tools/call",
  "params": {
    "name": "sp_update_keyword_bid",
    "arguments": {
      "profileId": "1234567890",
      "keywordId": "KW-001",
      "bid": 0.72
    }
  }
}

// Response (MCP Server → MCP Client)
{
  "jsonrpc": "2.0",
  "id": 1,
  "result": {
    "content": [
      {"type": "text", "text": "Keyword KW-001 bid updated to $0.72"}
    ]
  }
}</pre>

<h3>MCP Tool Discovery (tools/list)</h3>
<p>Before Claude can use MCP tools, your client calls <code>tools/list</code> to discover available tools and passes them to Claude:</p>
<pre>// Request
{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}

// Response includes tool definitions with inputSchema
// Your Go app reads these and passes them in Claude's tools[] array</pre>

<h3>Transport Options</h3>
<table>
<tr><th>Transport</th><th>When to use</th><th>How</th></tr>
<tr><td>stdio</td><td>Local development, MCP server runs as subprocess</td><td>Go app spawns the server process, communicates via stdin/stdout</td></tr>
<tr><td>HTTP/SSE</td><td>Production, server runs as a separate service</td><td>POST to /messages endpoint, server-sent events for responses</td></tr>
</table>

<h3>The Full Flow: Claude → MCP → Amazon Ads</h3>
<pre>1. tools/list: Discover all MCP tools from the server
2. Pass those tool definitions to Claude in the tools[] array
3. Claude analyzes metrics, emits tool_use: "sp_update_keyword_bid"
4. Your Go app translates tool_use input to a tools/call MCP request
5. MCP server calls Amazon Ads API (SP API v3 PUT /keywords)
6. MCP server returns the result as MCP JSON-RPC response
7. Your Go app wraps the result in a tool_result, sends back to Claude
8. Claude confirms the action and explains its reasoning</pre>

<h3>Amazon Ads MCP Server Tool Examples</h3>
<table>
<tr><th>MCP Tool Name</th><th>Amazon Ads API Endpoint</th></tr>
<tr><td>sp_get_campaigns</td><td>GET /sp/campaigns</td></tr>
<tr><td>sp_update_keyword_bid</td><td>PUT /sp/keywords</td></tr>

</table>

<h2>Building a Go MCP Server</h2>
<p>An MCP server is a process that speaks JSON-RPC 2.0. In Go, you read JSON-RPC requests from stdin (or HTTP), route to handler functions, and write responses to stdout. No framework required — just encoding/json and bufio.</p>

<h3>Core Structs</h3>
<pre>type JSONRPCRequest struct {
  JSONRPC string          \`json:"jsonrpc"\`
  ID      int             \`json:"id"\`
  Method  string          \`json:"method"\`
  Params  json.RawMessage \`json:"params"\`
}

type JSONRPCResponse struct {
  JSONRPC string      \`json:"jsonrpc"\`
  ID      int         \`json:"id"\`
  Result  interface{} \`json:"result,omitempty"\`
  Error   interface{} \`json:"error,omitempty"\`
}</pre>

<h3>Main Loop (stdio transport)</h3>
<pre>func main() {
  fmt.Fprintln(os.Stderr, "MCP Server started") // log to stderr only
  scanner := bufio.NewScanner(os.Stdin)
  for scanner.Scan() {
    var req JSONRPCRequest
    json.Unmarshal(scanner.Bytes(), &req)

    var result interface{}
    switch req.Method {
    case "tools/list":
      result = handleToolsList()
    case "tools/call":
      result = handleToolsCall(req.Params)
    }

    resp := JSONRPCResponse{JSONRPC: "2.0", ID: req.ID, Result: result}
    out, _ := json.Marshal(resp)
    fmt.Println(string(out)) // stdout = JSON-RPC channel
  }
}</pre>

<h3>Implementing tools/list</h3>
<pre>func handleToolsList() interface{} {
  return map[string]interface{}{
    "tools": []map[string]interface{}{
      {
        "name": "sp_update_keyword_bid",
        "description": "Update a Sponsored Products keyword bid",
        "inputSchema": map[string]interface{}{
          "type": "object",
          "properties": map[string]interface{}{
            "profileId": map[string]string{"type": "string"},
            "keywordId": map[string]string{"type": "string"},
            "bid":       map[string]string{"type": "number"},
          },
          "required": []string{"profileId", "keywordId", "bid"},
        },
      },
    },
  }
}</pre>

<h3>Implementing tools/call</h3>
<pre>type ToolCallParams struct {
  Name      string          \`json:"name"\`
  Arguments json.RawMessage \`json:"arguments"\`
}

func handleToolsCall(params json.RawMessage) interface{} {
  var p ToolCallParams
  json.Unmarshal(params, &p)
  switch p.Name {
  case "sp_update_keyword_bid":
    return updateKeywordBid(p.Arguments)
  default:
    return map[string]string{"error": "unknown tool: " + p.Name}
  }
}

func updateKeywordBid(args json.RawMessage) interface{} {
  var a struct {
    KeywordID string  \`json:"keywordId"\`
    Bid       float64 \`json:"bid"\`
  }
  json.Unmarshal(args, &a)
  // In production: call Amazon Ads SP API v3 PUT /keywords here
  return map[string]interface{}{
    "content": []map[string]string{
      {"type": "text", "text": fmt.Sprintf("Updated %s bid to $%.2f", a.KeywordID, a.Bid)},
    },
  }
}</pre>

<h3>Key Design Principles</h3>
<ul>
<li><strong>Logs go to stderr</strong> — stdout is the JSON-RPC channel; any non-JSON on stdout breaks the protocol</li>
<li><strong>Auth in the server</strong> — the MCP server holds the Amazon Ads OAuth token; the orchestration layer never sees it</li>
<li><strong>Stateless tools</strong> — each tools/call is independent; don't rely on in-memory state between calls</li>
<li><strong>Error in result</strong> — return <code>{"error": "msg"}</code> in the result field so Claude can read and react to failures</li>
<li><strong>Idempotent writes</strong> — bid updates should be safe to retry; use PUT not POST for updates</li>
</ul>
`

type ContentBlock struct {
	Type  string          \`json:"type"\`
	Text  string          \`json:"text,omitempty"\`
	ID    string          \`json:"id,omitempty"\`
	Name  string          \`json:"name,omitempty"\`
	Input json.RawMessage \`json:"input,omitempty"\`
}

type MCPClient struct{}

func (m *MCPClient) callTool(toolName string, args map[string]interface{}) string {
	rpcReq := map[string]interface{}{
		"jsonrpc": "2.0", "id": 1, "method": "tools/call",
		"params": map[string]interface{}{"name": toolName, "arguments": args},
	}
	_, _ = json.Marshal(rpcReq) // In production: write to MCP server stdin

	switch toolName {
	case "sp_get_keyword_metrics":
		kw, _ := args["keywordId"].(string)
		return fmt.Sprintf(\`{"keywordId":"%s","clicks":95,"spend":87.40,"sales":213.17,"acos":0.41}\`, kw)
	case "sp_update_keyword_bid":
		bid, _ := args["bid"].(float64)
		kw, _ := args["keywordId"].(string)
		return fmt.Sprintf("Bid updated for %s to $%.2f", kw, bid)
	default:
		return "Unknown tool: " + toolName
	}
}

func claudeRequest(apiKey string, body map[string]interface{}) map[string]interface{} {
	b, _ := json.Marshal(body)
	req, _ := http.NewRequest("POST", "https://api.anthropic.com/v1/messages", bytes.NewReader(b))
	req.Header.Set("x-api-key", apiKey)
	req.Header.Set("anthropic-version", "2023-06-01")
	req.Header.Set("content-type", "application/json")
	res, err := http.DefaultClient.Do(req)
	if err != nil {
		log.Fatal(err)
	}
	defer res.Body.Close()
	raw, _ := io.ReadAll(res.Body)
	var out map[string]interface{}
	json.Unmarshal(raw, &out)
	return out
}

func main() {
	apiKey := os.Getenv("ANTHROPIC_API_KEY")
	mcp := &MCPClient{}

	availableTools := []map[string]interface{}{
		{
			"name":        "sp_get_keyword_metrics",
			"description": "Get keyword performance. Returns clicks, spend, sales, ACOS.",
			"input_schema": map[string]interface{}{
				"type": "object",
				"properties": map[string]interface{}{
					"profileId": map[string]string{"type": "string"},
					"keywordId": map[string]string{"type": "string"},
					"startDate": map[string]string{"type": "string"},
					"endDate":   map[string]string{"type": "string"},
				},
				"required": []string{"profileId", "keywordId", "startDate", "endDate"},
			},
		},
		{
			"name":        "sp_update_keyword_bid",
			"description": "Update keyword bid. Only call if clicks >= 50 and ACOS off by > 5%.",
			"input_schema": map[string]interface{}{
				"type": "object",
				"properties": map[string]interface{}{
					"profileId": map[string]string{"type": "string"},
					"keywordId": map[string]string{"type": "string"},
					"bid":       map[string]string{"type": "number"},
				},
				"required": []string{"profileId", "keywordId", "bid"},
			},
		},
	}

	systemPrompt := "You are an Amazon Ads optimization agent. Target ACOS is 25%. Only update bids when clicks >= 50. Explain your reasoning."
	messages := []interface{}{
		map[string]interface{}{
			"role":    "user",
			"content": "Optimize the bid for keyword KW-789 (profileId: P-001) for date range 2026-06-01 to 2026-06-18",
		},
	}

	for {
		resp := claudeRequest(apiKey, map[string]interface{}{
			"model":      "claude-opus-4-8",
			"max_tokens": 1024,
			"system":     systemPrompt,
			"tools":      availableTools,
			"messages":   messages,
		})

		stopReason, _ := resp["stop_reason"].(string)
		contentRaw, _ := json.Marshal(resp["content"])
		var content []ContentBlock
		json.Unmarshal(contentRaw, &content)

		if stopReason == "tool_use" {
			var toolResults []map[string]interface{}
			for _, block := range content {
				if block.Type == "tool_use" {
					var args map[string]interface{}
					json.Unmarshal(block.Input, &args)
					result := mcp.callTool(block.Name, args)
					log.Printf("[%s] Tool: %s | Result: %s", time.Now().Format(time.RFC3339), block.Name, result)
					toolResults = append(toolResults, map[string]interface{}{
						"type":        "tool_result",
						"tool_use_id": block.ID,
						"content":     result,
					})
				}
			}
			messages = append(messages,
				map[string]interface{}{"role": "assistant", "content": content},
				map[string]interface{}{"role": "user", "content": toolResults},
			)
		} else {
			for _, block := range content {
				if block.Type == "text" {
					fmt.Println(block.Text)
				}
			}
			break
		}
	}

	fmt.Println("Agent run complete")
}`,
    checks: [
      { pattern: /type\s+MCPClient\s+struct/, msg: "MCPClient struct defined" },
      { pattern: /func.*callTool/, msg: "callTool method on MCPClient" },
      { pattern: /tools\/call/, msg: "JSON-RPC tools/call request constructed" },
      { pattern: /claudeRequest/, msg: "claudeRequest function defined" },
      { pattern: /stop_reason.*tool_use|stopReason.*tool_use|"tool_use"/, msg: "stop_reason tool_use loop handled" },
      { pattern: /log\.Printf/, msg: "Tool calls logged with log.Printf" },
      { pattern: /time\.Now\(\)\.Format/, msg: "Timestamp included in log" },
      { pattern: /tool_result/, msg: "tool_result messages built" },
      { pattern: /for\s*\{/, msg: "Agent loop with for {} implemented" },
    ]
  }
},

]; // end CURRICULUM

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let current = 0;
const done = new Set();

function updateProgress() {
  const pct = Math.round((done.size / CURRICULUM.length) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${done.size} of ${CURRICULUM.length} lessons complete`;
}

// ─────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────
function buildSidebar() {
  const nav = document.getElementById('lesson-nav');
  let lastModule = '';
  CURRICULUM.forEach((lesson, idx) => {
    if (lesson.module !== lastModule) {
      lastModule = lesson.module;
      const g = document.createElement('div'); g.className = 'module-group';
      const t = document.createElement('div'); t.className = 'module-group-title';
      t.textContent = lesson.module; g.appendChild(t); nav.appendChild(g);
    }
    const btn = document.createElement('button');
    btn.className = 'lesson-btn';
    btn.id = 'nav-' + idx;
    btn.onclick = () => goTo(idx);
    const typeLabel = { read: 'read', quiz: 'quiz', code: 'code' }[lesson.type];
    const badgeClass = { read: 'badge-read', quiz: 'badge-quiz', code: 'badge-code' }[lesson.type];
    btn.innerHTML = `
      <span class="lesson-icon">${done.has(idx) ? '✓' : (lesson.type === 'quiz' ? '❓' : lesson.type === 'code' ? '⌨' : '📄')}</span>
      <span>${lesson.title}</span>
      <span class="lesson-type-badge ${badgeClass}">${typeLabel}</span>`;
    nav.lastChild.appendChild(btn);
  });
}

function refreshSidebar() {
  CURRICULUM.forEach((_, idx) => {
    const btn = document.getElementById('nav-' + idx);
    if (!btn) return;
    btn.classList.toggle('active', idx === current);
    btn.classList.toggle('done', done.has(idx));
    const icon = btn.querySelector('.lesson-icon');
    const l = CURRICULUM[idx];
    icon.textContent = done.has(idx) ? '✓' : (l.type === 'quiz' ? '❓' : l.type === 'code' ? '⌨' : '📄');
  });
}

// ─────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────
function goTo(idx) {
  current = idx;
  render();
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= CURRICULUM.length) return;
  done.add(current);
  goTo(next);
  updateProgress();
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  const lesson = CURRICULUM[current];
  document.getElementById('lesson-title').textContent = lesson.title;
  document.getElementById('lesson-meta').textContent = lesson.module;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').textContent = current === CURRICULUM.length - 1 ? 'Finish ✓' : 'Next →';
  refreshSidebar();

  const content = document.getElementById('content');
  if (lesson.type === 'read') renderRead(content, lesson);
  else if (lesson.type === 'quiz') renderQuiz(content, lesson);
  else if (lesson.type === 'code') renderCode(content, lesson);
  content.scrollTop = 0;
}

// ── READ ──
function renderRead(container, lesson) {
  container.innerHTML = lesson.content();
}

// ── QUIZ ──
function renderQuiz(container, lesson) {
  const answered = {};
  let html = `<div class="quiz-section"><h2>${lesson.title}</h2><p class="tagline">❓ Quiz · ${lesson.questions.length} questions</p>`;
  lesson.questions.forEach((q, qi) => {
    html += `<div class="q-block" id="qb-${qi}">
      <div class="q-num">Question ${qi+1} of ${lesson.questions.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((o, oi) => `<button class="opt-btn" id="opt-${qi}-${oi}" onclick="selectOpt(${qi},${oi})">${String.fromCharCode(65+oi)}. ${o}</button>`).join('')}
      </div>
      <div class="q-feedback" id="fb-${qi}"></div>
    </div>`;
  });
  html += `<button class="quiz-submit" onclick="submitQuiz(${lesson.questions.length})">Submit Answers</button>`;
  html += `<div class="quiz-score" id="quiz-score"></div></div>`;
  container.innerHTML = html;

  window._quizAnswered = {};

  window.selectOpt = (qi, oi) => {
    if (window._quizAnswered[qi] !== undefined) return;
    // Clear previous selection for this question
    lesson.questions[qi].opts.forEach((_, i) => {
      document.getElementById(`opt-${qi}-${i}`)?.classList.remove('selected');
    });
    document.getElementById(`opt-${qi}-${oi}`)?.classList.add('selected');
    window._quizAnswered[qi] = oi;
  };

  window.submitQuiz = (total) => {
    let score = 0;
    lesson.questions.forEach((q, qi) => {
      const chosen = window._quizAnswered[qi];
      const block = document.getElementById(`qb-${qi}`);
      const fb = document.getElementById(`fb-${qi}`);
      q.opts.forEach((_, oi) => {
        const btn = document.getElementById(`opt-${qi}-${oi}`);
        btn.disabled = true;
        btn.classList.remove('selected');
        if (oi === q.ans) btn.classList.add('correct-ans');
        else if (oi === chosen && chosen !== q.ans) btn.classList.add('wrong-ans');
      });
      if (chosen === q.ans) {
        score++;
        block.classList.add('correct');
        fb.textContent = '✓ Correct! ' + q.exp;
        fb.className = 'q-feedback show ok';
      } else {
        block.classList.add('wrong');
        fb.textContent = '✗ ' + (chosen === undefined ? 'No answer selected. ' : '') + q.exp;
        fb.className = 'q-feedback show bad';
      }
    });
    const scoreEl = document.getElementById('quiz-score');
    const pct = Math.round((score/total)*100);
    scoreEl.innerHTML = `<div class="score-num">${score}/${total}</div><div class="score-label">${pct}% — ${pct>=80?'Great work! 🎉':pct>=60?'Good effort — review the explanations above.':'Review the reading and try again.'}</div>`;
    scoreEl.classList.add('show');
    if (pct >= 60) done.add(current);
    updateProgress();
    refreshSidebar();
  };
}

// ── CODE ──
function renderCode(container, lesson) {
  const ch = lesson.challenge;
  let reqHTML = ch.requirements.map(r => `<li>${r}</li>`).join('');
  container.innerHTML = `
  <div class="code-section">
    <h2>${ch.title}</h2>
    <p class="tagline">⌨ Go Code Challenge</p>
    <div class="challenge-desc">
      <h3>Challenge</h3>
      <p style="font-size:14px;line-height:1.7;margin-bottom:12px">${ch.desc}</p>
      <h3 style="margin-top:12px">Requirements</h3>
      <ul class="hints-list">${reqHTML}</ul>
    </div>
    <div class="editor-wrap">
      <div class="editor-header">
        <span>main.go</span>
        <div class="editor-actions">
          <button class="editor-btn" onclick="resetCode()">Reset</button>
          <button class="editor-btn" onclick="showSolution()">Show Solution</button>
          <button class="editor-btn run-btn" onclick="runChecks()">▶ Check Code</button>
        </div>
      </div>
      <textarea id="code-editor" spellcheck="false">${escHtml(ch.starter)}</textarea>
    </div>
    <div class="output-panel" id="output-panel"><span style="color:var(--muted)">Click "Check Code" to validate your implementation...</span></div>
    <div class="solution-panel" id="solution-panel">
      <h4>✓ Reference Solution</h4>
      <pre>${escHtml(ch.solution)}</pre>
    </div>
  </div>`;

  // Tab key in textarea
  document.getElementById('code-editor').addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = this.selectionStart, end = this.selectionEnd;
      this.value = this.value.substring(0,s) + '\t' + this.value.substring(end);
      this.selectionStart = this.selectionEnd = s + 1;
    }
  });

  window.resetCode = () => {
    document.getElementById('code-editor').value = ch.starter;
    document.getElementById('output-panel').innerHTML = '<span style="color:var(--muted)">Reset. Click "Check Code" to validate...</span>';
    document.getElementById('solution-panel').classList.remove('show');
  };

  window.showSolution = () => {
    document.getElementById('solution-panel').classList.toggle('show');
  };

  window.runChecks = () => {
    const code = document.getElementById('code-editor').value;
    const out = document.getElementById('output-panel');
    let lines = [];
    let passed = 0;
    ch.checks.forEach(chk => {
      const ok = chk.pattern.test(code);
      if (ok) passed++;
      lines.push(`<div class="out-line ${ok?'out-ok':'out-err'}">${ok?'✓':'✗'} ${chk.msg}</div>`);
    });
    const total = ch.checks.length;
    const pct = Math.round((passed/total)*100);
    lines.push(`<div class="out-line" style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px;color:${pct===100?'var(--success)':pct>=70?'var(--warn)':'var(--error)'}">${passed}/${total} checks passed (${pct}%)</div>`);
    if (pct === 100) {
      lines.push(`<div class="out-line out-ok" style="margin-top:6px">🎉 All checks passed! Well done.</div>`);
      done.add(current);
      updateProgress();
      refreshSidebar();
    }
    out.innerHTML = lines.join('');
  };
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
buildSidebar();
render();
updateProgress();
</script>
</body>
</html>
